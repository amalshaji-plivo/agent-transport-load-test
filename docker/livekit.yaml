# LiveKit Server config for the lkp-vs-lkg bench. Dev mode auto-generates
# protocols but we set the three RTC ports explicitly so the docker-compose
# port-mapping matches what the SFU advertises.
port: 7880
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: false
keys:
  devkey: secret
log_level: info
