# Override to disable VAD across all server variants and run direct-pipecat
# with 4 uvicorn workers (matching non-prod plivo-cx-pipecat).
# Apply with: docker compose -f docker-compose.yml -f docker-compose.novad.yml up -d
services:
  direct-pipecat:
    environment:
      ENABLE_VAD: "false"
      WORKERS: "4"

  agent-transport-python-vad:
    environment:
      ENABLE_VAD: "false"
      VAD_BACKEND: "off"

  agent-transport-rust-vad:
    environment:
      ENABLE_VAD: "false"
      VAD_BACKEND: "off"
      WS_PORT: "8082"
