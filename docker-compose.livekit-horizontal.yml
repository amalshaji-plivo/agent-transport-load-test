services:
  agent-transport-livekit:
    profiles: ["never"]

  agent-transport-livekit-horiz-1:
    build:
      context: .
      dockerfile: Dockerfile.agent-transport-livekit
    ports:
      - "8091:8091"
    environment:
      WS_PORT: "8091"
      HTTP_PORT: "8191"
      ENABLE_VAD: "false"
    cpus: "1.0"
    mem_limit: "${MEM_LIMIT:-4G}"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "${MEM_LIMIT:-4G}"

